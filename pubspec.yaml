name: draconia_quiz
description: "Finde heraus, welche Drachenart und welches Element du bist."
publish_to: 'none'

version: 1.0.2+3

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  audioplayers: ^6.1.0
  go_router: ^14.6.3
  share_plus: ^10.1.4
  package_info_plus: ^8.1.3
  url_launcher: ^6.3.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/app/app_icon.png"
  background_color: "#0D0A1A"
  adaptive_icon_background: "#0D0A1A"
  adaptive_icon_foreground: "assets/images/app/app_icon.png"

flutter_native_splash:
  color: "#0D0A1A"
  image: assets/images/app/splash_background.png
  android: true
  ios: true
  web: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/app/
    - assets/images/results/grossdrache/
    - assets/images/results/lung_drache/
    - assets/images/results/wyvern/
    - assets/images/results/lindwurm/
    - assets/images/results/amphithere/
    - assets/images/results/leviathan/
    - assets/images/results/seraph/
    - assets/images/results/fae_drache/
    - assets/icons/elements/
    - assets/audio/

  fonts:
    - family: CinzelDecorative
      fonts:
        - asset: assets/fonts/CinzelDecorative-Regular.ttf
        - asset: assets/fonts/CinzelDecorative-Bold.ttf
          weight: 700
        - asset: assets/fonts/CinzelDecorative-Black.ttf
          weight: 900
    - family: Cinzel
      fonts:
        - asset: assets/fonts/Cinzel-Regular.ttf
        - asset: assets/fonts/Cinzel-Bold.ttf
          weight: 700
    - family: CrimsonText
      fonts:
        - asset: assets/fonts/CrimsonText-Regular.ttf
        - asset: assets/fonts/CrimsonText-Italic.ttf
          style: italic
        - asset: assets/fonts/CrimsonText-Bold.ttf
          weight: 700
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
